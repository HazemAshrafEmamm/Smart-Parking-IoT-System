<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - نظام المواقف الذكية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 5px solid #3498db; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تسجيل الدخول 🅿️</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول للنظام</button>
        <div id="error" class="error">خطأ في البيانات، حاول مرة أخرى</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn0n6_0A3ev1bsULB75dqwPzBYhV*****",
            authDomain: "smart-parking-*****.firebaseapp.com",
            databaseURL: "https://smart-parking-*****-default-rtdb.firebaseio.com",
            projectId: "smart-parking-*****",
        };
        firebase.initializeApp(firebaseConfig);

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                if (email === "admin@1dc81c2f.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "user.html";
                }
            })
            .catch((error) => { document.getElementById('error').style.display = 'block'; });
        }
    </script>
</body>
</html>
